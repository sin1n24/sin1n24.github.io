name: Update data files

on:
  push:
    branches: [main]
    paths-ignore:
      - "_data/**"
      - "**.md"
      - "img/**"
  schedule:
    - cron: "0 18 * * *"  # 03:00 JST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pyyaml

      - name: Fetch ProtoPedia works
        run: python scripts/fetch_protopedia.py

      - name: Fetch GitHub repos
        run: python scripts/fetch_github.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/protopedia_works.yml _data/github_repos.yml
          git diff --staged --quiet || git commit -m "chore: update data [skip ci]"
          git push
