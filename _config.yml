remote_theme: hydecorp/hydejack@v9.2.1
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-seo-tag # ←【追加】SEOプラグインを明示的に有効化

future: true
paginate: 10
paginate_path: "/blog/page:num/"

title: "sin1's studio"
# 【修正】ウェブサイト向けの説明文（jekyll-seo-tagが構造化データやOGPに利用します）
description: "ロボットつくるよ"
lang: ja

url: "https://sin1.studio"
baseurl: ""
theme_color: "#1111aa"
permalink: /blog/:title/

logo: "/img/logo.png" # 実際のロゴのパスがあれば指定してください

author:
  name: "sin1"
  email: "sin1+hp@sin1.studio"
  twitter: "sin1west" # 【追加】jekyll-seo-tag用（@なしのIDのみを指定）
  
  # ↓これ以下はHydejackのメニュー・フッターアイコン表示用です
  social:
    twitter: "https://x.com/sin1west"
    github: "https://github.com/sin1n24"
    YouTube: "https://www.youtube.com/@sin1n24"
    MakerWorld: "https://makerworld.com/en/@sin1west"
    email: "mailto:sin1@sin1.studio"
    Blog: "https://sin1n24.hatenablog.com/"

# 【追加】jekyll-seo-tagの構造化データ（sameAs）用のリンク設定
social:
  name: "sin1's studio"
  links:
    - https://x.com/sin1west
    - https://github.com/sin1n24
    - https://www.youtube.com/@sin1n24
    - https://makerworld.com/en/@sin1west
    - https://sin1n24.hatenablog.com/

data_social:
  youtube:
    name: YouTube
    icon: icon-youtube
  makerworld:
    name: MakerWorld
    icon: icon-makerworld
  blog:
    name: Blog
    icon: icon-blog

menu:
  - title: 新着情報
    url: /index.html#新着情報
  - title: 作品
    url: /index.html#作品（コンテスト・展示）
  - title: ソフト
    url: /index.html#ソフト・サービス
  - title: ロボット
    url: /index.html#ロボット
  - title: ハードウエア
    url: /index.html#ハードウエア
  - title: ソフトウエア
    url: /index.html#ソフトウエア
  - title: 企画
    url: /index.html#企画
  - title: Blog
    url: /blog/

favicon: /img/favicon.ico
accent_image: /img/bg-image.jpg

hydejack:
  date_format: "%Y年%m月%d日"
  dark_mode:
    dynamic: true
    icon: true
  offline:
    enabled: false

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - _site/
  
copyright: "© 2025 sin1. All rights reserved."
